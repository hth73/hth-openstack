---
- name: install nginx
  apt:
    name: nginx
    state: present

- name: debug user
  command: whoami
  register: who
- debug:
    var: who.stdout

- name: ensure /mnt/data exists
  file:
    path: /mnt/data
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: remove default site (if exists as file)
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default

- name: validate nginx config
  command: nginx -t

- name: enable site
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link

- name: ensure nginx enabled but stopped
  systemd:
    name: nginx
    enabled: yes
    state: stopped
